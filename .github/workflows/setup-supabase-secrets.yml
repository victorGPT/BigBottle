name: Setup Supabase Secrets

on:
  workflow_dispatch:
    inputs:
      jwt_secret:
        description: 'JWT_SECRET (optional; leave empty to keep current remote secret unchanged)'
        required: false
        type: string
      supabase_url:
        description: 'BB_SUPABASE_URL'
        required: false
        type: string
        default: 'https://tbvkyvxdhrmfprcjyvbk.supabase.co'
      service_role_key:
        description: 'BB_SUPABASE_SERVICE_ROLE_KEY'
        required: false
        type: string
      aws_region:
        description: 'AWS_REGION (optional)'
        required: false
        type: string
      s3_bucket:
        description: 'S3_BUCKET (optional)'
        required: false
        type: string
      aws_access_key:
        description: 'AWS_ACCESS_KEY_ID (optional)'
        required: false
        type: string
      aws_secret_key:
        description: 'AWS_SECRET_ACCESS_KEY (optional)'
        required: false
        type: string
      dify_mode:
        description: 'DIFY_MODE (optional, default: mock)'
        required: false
        type: choice
        options:
          - mock
          - workflow
      dify_api_url:
        description: 'DIFY_API_URL (optional)'
        required: false
        type: string
      dify_api_key:
        description: 'DIFY_API_KEY (optional)'
        required: false
        type: string
      dify_workflow_id:
        description: 'DIFY_WORKFLOW_ID (optional)'
        required: false
        type: string
      cors_origin:
        description: 'CORS_ORIGIN (your Vercel frontend URL)'
        required: false
        type: string
      deploy_function:
        description: 'Deploy Edge Function after setting secrets?'
        required: false
        type: boolean
        default: true

env:
  PROJECT_REF: tbvkyvxdhrmfprcjyvbk

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set access token
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "❌ Error: SUPABASE_ACCESS_TOKEN secret is required"
            echo "Please add it at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Get it from: https://app.supabase.com/account/tokens"
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN=${{ secrets.SUPABASE_ACCESS_TOKEN }}" >> $GITHUB_ENV

      - name: Resolve JWT_SECRET
        id: resolve_jwt
        run: |
          if [ -n "${{ github.event.inputs.jwt_secret }}" ]; then
            echo "::add-mask::${{ github.event.inputs.jwt_secret }}"
            echo "jwt_secret=${{ github.event.inputs.jwt_secret }}" >> $GITHUB_OUTPUT
            echo "jwt_secret_source=workflow-input" >> $GITHUB_OUTPUT
            echo "set_jwt_secret=true" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "::add-mask::${{ secrets.JWT_SECRET }}"
            echo "jwt_secret=${{ secrets.JWT_SECRET }}" >> $GITHUB_OUTPUT
            echo "jwt_secret_source=github-secret" >> $GITHUB_OUTPUT
            echo "set_jwt_secret=true" >> $GITHUB_OUTPUT
          else
            echo "jwt_secret_source=keep-existing-remote-secret" >> $GITHUB_OUTPUT
            echo "set_jwt_secret=false" >> $GITHUB_OUTPUT
            echo "No JWT secret provided; keeping current remote JWT_SECRET unchanged."
          fi

      - name: Set JWT_SECRET when provided
        if: steps.resolve_jwt.outputs.set_jwt_secret == 'true'
        run: |
          supabase secrets set JWT_SECRET="${{ steps.resolve_jwt.outputs.jwt_secret }}" --project-ref ${{ env.PROJECT_REF }}
          echo "✅ JWT_SECRET set"

      - name: Set required non-JWT secrets
        run: |
          supabase secrets set BB_SUPABASE_URL="${{ github.event.inputs.supabase_url || secrets.SUPABASE_URL }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set BB_SUPABASE_SERVICE_ROLE_KEY="${{ github.event.inputs.service_role_key || secrets.SUPABASE_SERVICE_ROLE_KEY }}" --project-ref ${{ env.PROJECT_REF }}
          echo "✅ Required non-JWT secrets set"

      - name: Set optional AWS secrets
        if: github.event.inputs.aws_region != ''
        run: |
          supabase secrets set AWS_REGION="${{ github.event.inputs.aws_region }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set S3_BUCKET="${{ github.event.inputs.s3_bucket }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set AWS_ACCESS_KEY_ID="${{ github.event.inputs.aws_access_key }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set AWS_SECRET_ACCESS_KEY="${{ github.event.inputs.aws_secret_key }}" --project-ref ${{ env.PROJECT_REF }}
          echo "✅ AWS secrets set"

      - name: Set optional Dify secrets
        if: github.event.inputs.dify_mode != ''
        run: |
          supabase secrets set DIFY_MODE="${{ github.event.inputs.dify_mode }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set DIFY_API_URL="${{ github.event.inputs.dify_api_url }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set DIFY_API_KEY="${{ github.event.inputs.dify_api_key }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set DIFY_WORKFLOW_ID="${{ github.event.inputs.dify_workflow_id }}" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set DIFY_IMAGE_INPUT_KEY="image_url" --project-ref ${{ env.PROJECT_REF }}
          supabase secrets set DIFY_TIMEOUT_MS="20000" --project-ref ${{ env.PROJECT_REF }}
          echo "✅ Dify secrets set"

      - name: Set CORS origin
        if: github.event.inputs.cors_origin != ''
        run: |
          supabase secrets set CORS_ORIGIN="${{ github.event.inputs.cors_origin }}" --project-ref ${{ env.PROJECT_REF }}
          echo "✅ CORS origin set"

      - name: Deploy Edge Function
        if: github.event.inputs.deploy_function == 'true'
        env:
          SUPABASE_PROJECT_REF: ${{ env.PROJECT_REF }}
        run: |
          bash scripts/ci/deploy_supabase_api.sh
          echo "✅ Edge Function deployed"

      - name: Verify deployment
        env:
          API_BASE_URL: https://${{ env.PROJECT_REF }}.supabase.co/functions/v1/api
          SUPABASE_PROJECT_REF: ${{ env.PROJECT_REF }}
        run: |
          set -euo pipefail
          bash scripts/ci/ensure_supabase_public_auth_routes.sh "${API_BASE_URL}"
          echo "✅ Public auth routes verified"

      - name: Summary
        run: |
          echo "## ✅ Supabase Setup Complete"
          echo ""
          echo "**Project:** ${{ env.PROJECT_REF }}"
          echo "**JWT secret source:** ${{ steps.resolve_jwt.outputs.jwt_secret_source }}"
          echo "**verify_jwt:** disabled on deploy"
          echo ""
          echo "### Next Steps:"
          echo "1. Run Setup Vercel Environment against the canonical Vercel project"
          echo "2. Redeploy the frontend if VITE_API_URL changed"
