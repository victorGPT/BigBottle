name: Supabase API Deploy Guard CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  supabase-api-deploy-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell guard tests
        run: |
          set -euo pipefail
          bash scripts/ci/test_check_supabase_api_deploy_canonical.sh
          bash scripts/ci/test_ensure_supabase_public_auth_routes.sh

      - name: Reject non-canonical Supabase API deploys
        run: |
          set -euo pipefail
          bash scripts/ci/check_supabase_api_deploy_canonical.sh
