name: Setup Vercel Environment

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'VITE_API_URL'
        required: false
        type: string
        default: 'https://tbvkyvxdhrmfprcjyvbk.supabase.co/functions/v1/api'
      project_id:
        description: 'Canonical Vercel project id'
        required: false
        type: string
        default: 'prj_tT4Rco10SiEzQGtIwOGvfLiznVVW'
      project_name:
        description: 'Canonical Vercel project name'
        required: false
        type: string
        default: 'big-bottle-web'
      org_id:
        description: 'Vercel org/team id'
        required: false
        type: string
        default: 'team_KKuO8n8XBOnBM2G0geo8WAef'
      set_production:
        description: 'Set Production environment?'
        required: false
        type: boolean
        default: true
      set_preview:
        description: 'Set Preview environment?'
        required: false
        type: boolean
        default: true
      redeploy:
        description: 'Trigger redeploy after setting env var?'
        required: false
        type: boolean
        default: true
      deploy_production:
        description: 'Deploy production instead of preview when redeploy=true?'
        required: false
        type: boolean
        default: false

jobs:
  setup-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel Token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ Error: VERCEL_TOKEN secret is required"
            echo "Please add it at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Get it from: https://vercel.com/account/tokens"
            exit 1
          fi
          echo "✅ VERCEL_TOKEN is configured"

      - name: Resolve canonical Vercel project info
        id: project
        run: |
          PROJECT_ID='${{ github.event.inputs.project_id }}'
          PROJECT_NAME='${{ github.event.inputs.project_name }}'
          ORG_ID='${{ github.event.inputs.org_id }}'

          if [ -z "$PROJECT_ID" ] || [ -z "$ORG_ID" ]; then
            echo "❌ Error: project_id and org_id are required"
            exit 1
          fi

          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "org_id=$ORG_ID" >> $GITHUB_OUTPUT
          echo "Project ID: $PROJECT_ID"
          echo "Project Name: $PROJECT_NAME"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ steps.project.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}

      - name: Set Production Environment Variable
        if: github.event.inputs.set_production == 'true'
        run: |
          vercel env rm VITE_API_URL production --token=${{ secrets.VERCEL_TOKEN }} --yes >/dev/null 2>&1 || true
          echo "${{ github.event.inputs.api_url }}" | vercel env add VITE_API_URL production --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ steps.project.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}

      - name: Set Preview Environment Variable
        if: github.event.inputs.set_preview == 'true'
        run: |
          vercel env rm VITE_API_URL preview --token=${{ secrets.VERCEL_TOKEN }} --yes >/dev/null 2>&1 || true
          echo "${{ github.event.inputs.api_url }}" | vercel env add VITE_API_URL preview --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ steps.project.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}

      - name: Build Project Artifacts
        if: github.event.inputs.redeploy == 'true'
        run: |
          if [ "${{ github.event.inputs.deploy_production }}" = "true" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ steps.project.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}

      - name: Deploy Project Artifacts to Vercel
        if: github.event.inputs.redeploy == 'true'
        run: |
          if [ "${{ github.event.inputs.deploy_production }}" = "true" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ steps.project.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}

      - name: Summary
        run: |
          if [ "${{ github.event.inputs.deploy_production }}" = "true" ]; then
            DEPLOY_TARGET=production
          else
            DEPLOY_TARGET=preview
          fi

          echo "## ✅ Vercel Setup Complete"
          echo ""
          echo "**Project:** ${{ steps.project.outputs.project_name }} (${{ steps.project.outputs.project_id }})"
          echo "**VITE_API_URL:** ${{ github.event.inputs.api_url }}"
          echo "**Environments:** Production=${{ github.event.inputs.set_production }}, Preview=${{ github.event.inputs.set_preview }}"
          echo "**Redeployed:** ${{ github.event.inputs.redeploy }}"
          echo "**Deploy target:** ${DEPLOY_TARGET}"
